<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭作业管理系统 v2.7</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; --dudu-color: #8b572a; --bobo-color: #666; --del-color: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); padding: 5px; margin: 0; color: #333; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .hidden { display: none !important; }
        input, select, button { width: 100%; padding: 10px; margin: 4px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        button { background: var(--primary-color); color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc !important; cursor: not-allowed; }
        
        .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .nav-btn { width: 35px; background: none; color: var(--primary-color); font-size: 18px; padding: 0; }
        h2#dateTitle { margin: 0; font-size: 0.95rem; font-weight: bold; }

        h3 { margin: 12px 0 4px 0; font-size: 0.9rem; border-left: 3px solid var(--primary-color); padding-left: 6px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 8px; }
        td, th { border: 1px solid #eee; padding: 5px 3px; font-size: 11px; text-align: left; }
        th { background: #fafafa; }
        
        .status-col { display: flex; flex-direction: column; gap: 4px; align-items: center; }
        .status-row { display: flex; align-items: center; gap: 4px; justify-content: center; font-size: 16px; }
        .status-icon { cursor: pointer; filter: grayscale(1); opacity: 0.3; transition: 0.2s; }
        .status-active { filter: grayscale(0); opacity: 1; }

        .action-col { display: flex; flex-direction: column; gap: 2px; }
        .mini-btn { width: 100%; padding: 4px 0; font-size: 10px; margin: 0; border-radius: 4px; line-height: 1.2; }
        .btn-move { background: #5bc0de; }
        .btn-copy { background: #5cb85c; } 
        .btn-move-tmr { background: #f0ad4e; }
        .btn-del { background: var(--del-color); }

        .btn-add { width: auto; padding: 5px 10px; font-size: 11px; margin: 4px 0; }
        .btn-save { background: #ff9500; margin-top: 15px; font-size: 15px; height: 45px; }
        .img-preview { width: 28px; height: 28px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="loginView" class="card">
        <h2 style="text-align:center; color:var(--primary-color); margin-top:0;">🏠 作业管理系统</h2>
        <select id="userRole">
            <option value="admin">家长 (管理员)</option>
            <option value="dudu">嘟嘟</option>
            <option value="bobo">啵啵</option>
        </select>
        <input type="password" id="password" placeholder="访问密码">
        <button onclick="doLogin()">登 录</button>
    </div>

    <div id="appView" class="card hidden">
        <div class="date-nav">
            <button class="nav-btn" onclick="changeDate(-1)">⬅️</button>
            <h2 id="dateTitle">加载中...</h2>
            <button class="nav-btn" onclick="changeDate(1)">➡️</button>
        </div>
        
        <p style="font-size:11px; color:#666; text-align:center; margin-bottom:12px;">用户: <span id="userDisplay" style="font-weight:bold"></span> | <a href="javascript:location.reload()">退出</a></p>
        
        <div id="adminArea" class="hidden">
            <h3 style="border-color:#ff9500;color:#e67e22">📋 1. 通用作业</h3>
            <table id="tbl-all">
                <thead><tr><th width="32%">科目</th><th width="32%">内容</th><th width="18%">状态</th><th width="18%">操作</th></tr></thead>
                <tbody class="list-body"></tbody>
            </table>
            <button class="btn-add" onclick="addRow('all')">+ 增加通用项</button>

            <h3 style="border-color:var(--dudu-color);color:var(--dudu-color)">👦🏼 2. 嘟嘟专属</h3>
            <table id="tbl-dudu">
                <thead><tr><th width="32%">科目</th><th width="32%">内容</th><th width="18%">状态</th><th width="18%">操作</th></tr></thead>
                <tbody class="list-body"></tbody>
            </table>
            <button class="btn-add" style="background:var(--dudu-color)" onclick="addRow('dudu')">+ 增加专属</button>

            <h3 style="border-color:#999;color:#666">👦🏻 3. 啵啵专属</h3>
            <table id="tbl-bobo">
                <thead><tr><th width="32%">科目</th><th width="32%">内容</th><th width="18%">状态</th><th width="18%">操作</th></tr></thead>
                <tbody class="list-body"></tbody>
            </table>
            <button class="btn-add" style="background:#b5b5b5" onclick="addRow('bobo')">+ 增加专属</button>

            <button id="saveBtn" class="btn-save" onclick="doSave(true)">🚀 发布今日作业并推送微信</button>
        </div>

        <div id="studentArea" class="hidden">
            <table id="tbl-student">
                <thead><tr><th width="28%">科目</th><th width="42%">内容</th><th width="15%">状态</th><th width="15%">拍照</th></tr></thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SB_URL = "https://mupjybbafixsmdlsqxxq.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11cGp5YmJhZml4c21kbHNxeHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzUwMTcsImV4cCI6MjA4ODYxMTAxN30.bfNvl_e30pv8EVNeMcJj7O60p96ltp96J2abm2YT7hA"; 
        const SERVER_CHAN_KEY = "SCT135651TZHh6tUlVaovebckiayAAfcuw";

        const client = window.supabase.createClient(SB_URL, SB_KEY);
        const users = {'admin':'admin', 'dudu':'dudu', 'bobo':'bobo'};
        const subjects = ["学而思数学", "乐读数学", "乐读英语", "乐读语文", "校内作业", "集训队", "其他"];
        
        // 增加一个状态集合，用于记录哪些任务正在被 AI 批改，优化用户体验
        window.pendingAITasks = new Set();

        const defaultCommonTasks = [
            {s: "学而思数学", c: "数感小超市"},
           // {s: "乐读数学", c: "乐读小超市"},
            {s: "乐读英语", c: "单词小超市"},
            {s: "乐读语文", c: "小花园"}
           // {s: "乐读语文", c: "生字描红本"}
        ];

        let currentRole = '';
        let viewDate = new Date();
        const getStr = (d) => new Intl.DateTimeFormat('zh-CN', {timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit'}).format(d).replace(/\//g, '-');

        // 确保全局变量存在，避免报错
        window.pendingAITasks = window.pendingAITasks || new Set();

        // 唤起相机的核心函数
        window.triggerCamera = function(id) {
            const camInput = document.getElementById('cam-' + id);
            if (camInput) {
                camInput.click(); // 模拟点击隐藏的 input
            } else {
                alert("未找到上传控件，请刷新页面重试！");
            }
        }; 
        
        function doLogin() {
            const role = document.getElementById('userRole').value;
            const pass = document.getElementById('password').value;
            if (users[role] === pass) {
                currentRole = role;
                document.getElementById('userDisplay').innerText = role==='admin'?'家长':(role==='dudu'?'👦🏼嘟嘟':'👦🏻啵啵');
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                loadDashboard();
            } else alert("密码错误");
        }

        async function changeDate(days) {
            if (currentRole === 'admin') {
                await doSave(false);
            }
            viewDate.setDate(viewDate.getDate() + days);
            const today = new Date();
            const tomorrow = new Date(today.getTime() + 864e5);
            
            if (viewDate > tomorrow && getStr(viewDate) !== getStr(tomorrow)) {
                viewDate.setDate(viewDate.getDate() - days);
                return;
            }
            loadDashboard();
        }

        async function loadDashboard() {
            const dateStr = getStr(viewDate);
            const todayStr = getStr(new Date());
            const tomorrowStr = getStr(new Date(Date.now() + 864e5));
            const yesterdayStr = getStr(new Date(Date.now() - 864e5));

            let label = dateStr === todayStr ? " (今日)" : (dateStr === tomorrowStr ? " (明天)" : (dateStr === yesterdayStr ? " (昨天)" : ""));
            document.getElementById('dateTitle').innerText = dateStr + label;
            
            const isAdmin = currentRole === 'admin';
            document.getElementById('saveBtn').disabled = (dateStr !== todayStr);
            document.querySelectorAll('.list-body, #studentBody').forEach(b => b.innerHTML = '');

            try {
                // 按日期拉取数据
                const { data, error } = await client.from('HOMEWORK_TASKS').select('*').eq('date_str', dateStr).order('id');
                if (error) throw error;

                if (isAdmin) {
                    document.getElementById('adminArea').classList.remove('hidden');
                    document.getElementById('studentArea').classList.add('hidden');
                    const hasCommon = data.some(d => d.target_user === 'all');
                    if (hasCommon) {
                        data.forEach(d => addRow(d.target_user || 'all', d));
                    } else if (dateStr === todayStr || dateStr === tomorrowStr) {
                        defaultCommonTasks.forEach(t => addRow('all', {subject:t.s, content:t.c}));
                        data.filter(d => d.target_user !== 'all').forEach(d => addRow(d.target_user, d));
                        if (!data.some(d => d.target_user === 'dudu')) addRow('dudu');
                        if (!data.some(d => d.target_user === 'bobo')) addRow('bobo');
                    } else {
                        data.forEach(d => addRow(d.target_user || 'all', d));
                    }
                } else {
                    document.getElementById('adminArea').classList.add('hidden');
                    document.getElementById('studentArea').classList.remove('hidden');
                    data.filter(d => d.target_user === 'all' || d.target_user === currentRole).forEach(d => addStaticRow(d, dateStr === todayStr));
                }
            } catch (err) { console.error(err); }
        }

        function addRow(type, data = null) {
            const tbody = document.querySelector(`#tbl-${type} .list-body`);
            const tr = document.createElement('tr');
            
            // 【重要】将重要数据绑定到 DOM，防止管理员执行 doSave() 覆盖丢失孩子图片和 AI 评价
            if (data && data.id) {
                tr.dataset.id = data.id;
                if (data.image_url) tr.dataset.image_url = data.image_url;
                if (data.dudu_img) tr.dataset.dudu_img = data.dudu_img;
                if (data.bobo_img) tr.dataset.bobo_img = data.bobo_img;
                if (data.dudu_review) tr.dataset.dudu_review = data.dudu_review;
                if (data.bobo_review) tr.dataset.bobo_review = data.bobo_review;
            }

            let opts = subjects.map(s => `<option value="${s}" ${(data && data.subject === s) ? 'selected' : ''}>${s}</option>`).join('');
            
            let statusHtml = '';
            if (type === 'all') {
                statusHtml = `<div class="status-col">
                    <div class="status-row"><span>👦🏼</span><span class="status-icon ${data?.dudu_status?'status-active':''}" onclick="toggleQuickStatus(this)">✅</span></div>
                    <div class="status-row"><span>👦🏻</span><span class="status-icon ${data?.bobo_status?'status-active':''}" onclick="toggleQuickStatus(this)">✅</span></div>
                </div>`;
            } else {
                statusHtml = `<div class="status-row"><span>${type==='dudu'?'👦🏼':'👦🏻'}</span><span class="status-icon ${data?.status?'status-active':''}" onclick="toggleQuickStatus(this)">✅</span></div>`;
            }

            let actionHtml = `<div class="action-col">`;
            if (type === 'all') {
                actionHtml += `<button class="mini-btn btn-move" onclick="moveTask(this, 'dudu')">➡嘟专属</button>`;
                actionHtml += `<button class="mini-btn btn-move" onclick="moveTask(this, 'bobo')">➡啵专属</button>`;
            } else {
                const targetName = type === 'dudu' ? '啵啵' : '嘟嘟';
                const targetKey = type === 'dudu' ? 'bobo' : 'dudu';
                actionHtml += `<button class="mini-btn btn-copy" onclick="copyToOther(this, '${targetKey}')">👯加给${targetName}</button>`;
                actionHtml += `<button class="mini-btn btn-move-tmr" onclick="moveTaskToNextDay(this, '${type}')">📅移后一天</button>`;
            }
            actionHtml += `<button class="mini-btn btn-del" onclick="deleteTask(this)">删除</button></div>`;
            
            // 【UI更新】管理员也能在下方看到 AI 批改的结果
            let reviewHtml = '';
            if (data) {
                if ((type === 'all' || type === 'dudu') && data.dudu_review) {
                    reviewHtml += `<div style="font-size:10px; color:#8b572a; margin-top:4px; background:#fff3e0; padding:4px; border-radius:3px; white-space: pre-wrap;">👦🏼 ${data.dudu_review}</div>`;
                }
                if ((type === 'all' || type === 'bobo') && data.bobo_review) {
                    reviewHtml += `<div style="font-size:10px; color:#666; margin-top:4px; background:#f5f5f5; padding:4px; border-radius:3px; white-space: pre-wrap;">👦🏻 ${data.bobo_review}</div>`;
                }
                // AI 批改进行中的提示
                if (window.pendingAITasks.has(data.id)) {
                    reviewHtml += `<div style="font-size:10px; color:#f57c00; margin-top:4px;">⏳ AI批改中...</div>`;
                }
            }

            tr.innerHTML = `<td><select class="s-in">${opts}</select></td>
                            <td><input type="text" class="c-in" value="${data ? data.content : ''}">${reviewHtml}</td>
                            <td>${statusHtml}</td>
                            <td>${actionHtml}</td>`;
            tbody.appendChild(tr);
        }
async function deleteTask(btn) {
            const tr = btn.closest('tr');
            const taskId = tr.dataset.id;
            
            if (confirm("确定要删除这项作业吗？")) {
                if (taskId) {
                    // 如果数据库里已经有这一条，执行物理删除
                    const { error } = await client.from('HOMEWORK_TASKS').delete().eq('id', taskId);
                    if (error) {
                        alert("删除失败: " + error.message);
                        return;
                    }
                }
                tr.remove(); // 移除界面元素
                // 物理删除后不需要再调用 doSave，因为数据库已经同步了
            }
        }
        
        function toggleQuickStatus(el) {
            el.classList.toggle('status-active');
            doSave(false); 
        }

        function copyToOther(el, toWho) {
            const tr = el.closest('tr');
            const sub = tr.querySelector('.s-in').value, con = tr.querySelector('.c-in').value;
            if (!con.trim()) return;
            addRow(toWho, {subject: sub, content: con});
            doSave(false);
        }

        function moveTask(el, toWho) {
            const tr = el.closest('tr');
            const sub = tr.querySelector('.s-in').value, con = tr.querySelector('.c-in').value;
            if (!con.trim()) return;
            addRow(toWho, {subject: sub, content: con});
            doSave(false); 
        }

async function moveTaskToNextDay(el, fromWho) {
            const tr = el.closest('tr');
            const sub = tr.querySelector('.s-in').value, con = tr.querySelector('.c-in').value;
            if (!con.trim()) return;
            
            const nextDay = new Date(viewDate);
            nextDay.setDate(nextDay.getDate() + 1);
            const nextDayStr = getStr(nextDay);
            
            // 插入新任务
            const { error } = await client.from('HOMEWORK_TASKS').insert({
                date_str: nextDayStr, 
                subject: sub, 
                content: con, 
                target_user: fromWho, 
                status: false
            });

            if(!error) {
                // 成功移走后，删除当前行并保存当前页
                tr.remove();
                await doSave(false);
                alert(`✅ 已移至 ${nextDayStr}`);
            } else {
                alert("操作失败");
            }
        }
        
        function addStaticRow(d, isToday) {
            const tr = document.createElement('tr');
            
            // 准确获取对应角色的图片（支持解析逗号分隔的多图 URL）
            const imgRaw = currentRole === 'dudu' ? (d.dudu_img || d.image_url) : (d.bobo_img || d.image_url);
            let imgHtml = '';
            if (imgRaw) {
                const urls = imgRaw.split(',');
                urls.forEach(url => {
                    if (url.trim()) {
                        // 增加 max-width 避免多图把表格撑爆
                        imgHtml += `<img src="${url.trim()}" class="img-preview" style="margin-right:2px; margin-bottom:2px; max-width: 50px; cursor: pointer;" onclick="window.open('${url.trim()}')">`;
                    }
                });
            }
            
            // 【修复点】：增加 type="button" 防止刷新，强化 onclick 的传参兼容性
            const btn = isToday ? `<button type="button" style="width:auto;padding:4px;font-size:10px;background:#5856d6;color:white;border-radius:4px;border:none;" onclick="window.triggerCamera('${d.id}')">📸拍照/上传</button>` : '';
            
            let myStatus = false;
            let myReview = '';
            
            if (currentRole === 'dudu') {
                myStatus = d.target_user === 'all' ? d.dudu_status : d.status;
                myReview = d.dudu_review || '';
            } else if (currentRole === 'bobo') {
                myStatus = d.target_user === 'all' ? d.bobo_status : d.status;
                myReview = d.bobo_review || '';
            }

            let contentHtml = `<span>${d.content}</span>`;
            
            // 【修复点】：防御性检查，防止 Set 未初始化报错
            window.pendingAITasks = window.pendingAITasks || new Set();
            if (window.pendingAITasks.has(d.id)) {
                contentHtml += `<div style="margin-top:5px; padding:6px; background:#fff8e1; color:#f57c00; font-size:11px; border-radius:4px;">⏳ AI正在批改多页内容，请稍候...</div>`;
            } else if (myReview) {
                contentHtml += `<div style="margin-top:5px; padding:6px; background:#f0f8ff; border-left:3px solid #4a90e2; border-radius:4px; font-size:11px; color:#333; white-space: pre-wrap;">🤖 <b>AI批改:</b><br>${myReview}</div>`;
            }

            // 【修复点】：input 标签的 id 严格对应 triggerCamera，并加上 multiple 支持多图
            tr.innerHTML = `
                <td>${d.subject}</td>
                <td>${contentHtml}</td>
                <td style="text-align:center">${myStatus?'🟢':'⚪'}</td>
                <td>
                    <div style="display:flex; flex-wrap:wrap;">${imgHtml}</div>
                    ${btn}
                    <input type="file" id="cam-${d.id}" accept="image/*" multiple style="display:none" onchange="handleFileSelect(this, ${d.id}, '${d.target_user}')">
                </td>
            `;
            document.getElementById('studentBody').appendChild(tr);
        }
        
async function doSave(needPush = false) {
            const dateStr = getStr(viewDate);
            
            // 【核心修复】：将需要新增、更新、删除的任务分装到不同的数组
            const tasksToInsert = [];
            const tasksToUpdate = [];
            const tasksToDelete = []; 
            
            let pushText = `📅 **日期: ${dateStr}**\n\n`;

            // 1. 遍历三个表格收集数据
            ['all', 'dudu', 'bobo'].forEach(type => {
                const rows = document.querySelectorAll(`#tbl-${type} .list-body tr`);
                let sectHasData = false;
                const titleMap = { 'all': '📋 通用作业', 'dudu': '👦🏼 嘟嘟专属', 'bobo': '👦🏻 啵啵专属' };
                let sectContent = "";

                rows.forEach(r => {
                    const s = r.querySelector('.s-in').value;
                    const c = r.querySelector('.c-in').value;
                    const taskId = r.dataset.id && r.dataset.id !== "undefined" ? parseInt(r.dataset.id) : null;
                    
                    if (c.trim()) {
                        const t = { 
                            date_str: dateStr, 
                            subject: s, 
                            content: c.trim(), 
                            target_user: type 
                        };
                        
                        // 保留照片数据和 AI 评价
                        if (r.dataset.image_url) t.image_url = r.dataset.image_url;
                        if (r.dataset.dudu_img) t.dudu_img = r.dataset.dudu_img;
                        if (r.dataset.bobo_img) t.bobo_img = r.dataset.bobo_img;
                        if (r.dataset.dudu_review) t.dudu_review = r.dataset.dudu_review;
                        if (r.dataset.bobo_review) t.bobo_review = r.dataset.bobo_review;

                        // 处理完成状态
                        if (type === 'all') {
                            t.dudu_status = r.querySelector('.status-row:nth-child(1) .status-icon').classList.contains('status-active');
                            t.bobo_status = r.querySelector('.status-row:nth-child(2) .status-icon').classList.contains('status-active');
                        } else {
                            t.status = r.querySelector('.status-icon').classList.contains('status-active');
                        }
                        
                        // 【核心修复】：判断是已有数据还是新数据
                        if (taskId) {
                            t.id = taskId;
                            tasksToUpdate.push(t);
                        } else {
                            tasksToInsert.push(t);
                        }
                        
                        sectContent += `☑️ **${s}**: ${c.trim()}\n\n`;
                        sectHasData = true;
                    } else if (taskId) {
                        // 如果用户清空了文本框，并且这是个老数据，说明用户想删掉它
                        tasksToDelete.push(taskId);
                    }
                });
                if(sectHasData) pushText += `## ${titleMap[type]}\n` + sectContent + `\n---\n`;
            });

            try {
                // 2. 分别执行数据库操作，避免因 Key 结构不一致导致的报错
                
                // 执行删除（清空了文本框的旧作业）
                if (tasksToDelete.length > 0) {
                    const { error } = await client.from('HOMEWORK_TASKS').delete().in('id', tasksToDelete);
                    if (error) throw error;
                }
                
                // 执行新增（完全没有 ID 的新作业）
                if (tasksToInsert.length > 0) {
                    const { error } = await client.from('HOMEWORK_TASKS').insert(tasksToInsert);
                    if (error) throw error;
                }
                
                // 执行更新（已有 ID 的作业）
                if (tasksToUpdate.length > 0) {
                    const { error } = await client.from('HOMEWORK_TASKS').upsert(tasksToUpdate, { onConflict: 'id' });
                    if (error) throw error;
                }
                
                // 3. 微信推送
                if (needPush && SERVER_CHAN_KEY.startsWith("SCT")) {
                    await fetch(`https://sctapi.ftqq.com/${SERVER_CHAN_KEY}.send?title=${encodeURIComponent("🔔 作业提醒: " + dateStr)}&desp=${encodeURIComponent(pushText)}`, {mode:'no-cors'});
                    alert("发布成功！");
                } else if (!needPush) {
                    console.log("后台静默同步成功");
                }
                
                // 4. 保存后重新加载，确保所有行都获得了数据库分配的最新 ID
                await loadDashboard();

            } catch (err) { 
                console.error("保存失败详情:", err);
                alert(`保存失败: ${err.message || '未知错误，请检查控制台'}`);
            }
        }        

// ⚠️ 这是处理图片上传并触发 AI 的核心函数，请勿遗漏
        async function handleFileSelect(input, taskId, taskTargetUser) {
            const files = input.files; 
            if (!files || files.length === 0) return;
            
            try {
                // UI 优化：添加占位提示状态
                window.pendingAITasks = window.pendingAITasks || new Set();
                window.pendingAITasks.add(taskId);
                loadDashboard(); // 立即刷新，显示“⏳ AI批改中”等待状态
                
                const uploadedUrls = [];
                // 循环上传多张图片
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const fn = `hw_${taskId}_${currentRole}_${Date.now()}_${i}.jpg`;
                    await client.storage.from('HOMEWORK_PHOTOS').upload(fn, file);
                    const { data: urlData } = client.storage.from('HOMEWORK_PHOTOS').getPublicUrl(fn);
                    uploadedUrls.push(urlData.publicUrl);
                }
                
                // 将多个 URL 用逗号拼接存入数据库
                const joinedUrls = uploadedUrls.join(',');
                const updateObj = currentRole === 'dudu' ? { dudu_img: joinedUrls } : { bobo_img: joinedUrls };
                updateObj.image_url = joinedUrls; // 兼容旧版显示
                
                await client.from('HOMEWORK_TASKS').update(updateObj).eq('id', taskId);
                
                // 刷新页面，让缩略图先显示出来
                loadDashboard(); 

                // 核心：把上传好的图片数组传给 AI 进行批改
                callGeminiAI(uploadedUrls, taskId, taskTargetUser);
                
            } catch (err) { 
                window.pendingAITasks.delete(taskId);
                console.error("上传失败:", err);
                alert("多图上传失败，请重试"); 
                loadDashboard();
            }
        }
        
        
async function callGeminiAI(imageUrlsArray, taskId, taskTargetUser) {
            try {
                const { data, error } = await client.functions.invoke('gemini-review', {
                    body: {
                        imageUrls: imageUrlsArray, // 传递数组而不是单字符串
                        prompt: `
                        角色：你是一位拥有20年教学经验的资深小学导师，擅长极简、精准的作业批改，评价风格直击要点，拒绝冗余。
                        【重要提示】：用户上传了 ${imageUrlsArray.length} 张图片，这可能是一道题的题干和解答分成了多页，或者是连续的多页作业。请务必将所有图片结合起来作为同一个上下文进行综合理解和批改。
                        
                        任务：请识别并批改上传的图片（仅限：数学、语文、英语、日记之一）。
                        
                        输出格式要求：
                        1. 首行直接注明【科目：XXX】。
                        2. 核心反馈（按科目执行，此处无需出现标题,直接显示评价即可）：
                            - 数学：数据统计（总题量/空格数、错误数、正确率）+ 错题清单（序号及简要原因）。跨页的题目请整体看待。
                            - 语文：请先理解题目的意思再进行批改，批改过程中主要关注是否有错别字,以及书写不规范的地方。
                            - 英语：重点检查单词拼写、语法、时态，仅列出错误点及正确表达。
                            - 日记：罗列出不通顺处及修改建议，并用1句优点 + 1个改进点总结。
                        3. 最后总结：1句严谨的鼓励（不超过30字）。
                        `
                    }
                });
                
                if (error) throw error;
                
                if (data && data.text) {
                    const reviewField = currentRole === 'dudu' ? 'dudu_review' : 'bobo_review';
                    const updateObj = { [reviewField]: data.text };

                    if (taskTargetUser === 'all') {
                        const statusField = currentRole === 'dudu' ? 'dudu_status' : 'bobo_status';
                        updateObj[statusField] = true;
                    } else {
                        updateObj.status = true;
                    }

                    await client.from('HOMEWORK_TASKS').update(updateObj).eq('id', taskId);
                }
            } catch (err) { 
                console.error("Gemini 批改过程异常:", err); 
            } finally {
                window.pendingAITasks.delete(taskId);
                loadDashboard();
            }
        }
    </script>
