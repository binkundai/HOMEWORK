<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家庭作业管理系统 v3.4 (Gemini Pro)</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f5f7fa; --dudu-color: #8b572a; --bobo-color: #666; --del-color: #ff3b30; --ai-bg: #f0f7ff; --ai-border: #4a90e2; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); padding: 5px; margin: 0; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); margin-bottom: 10px; }
        .hidden { display: none !important; }
        input, select, button { width: 100%; padding: 10px; margin: 4px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        button { background: var(--primary-color); color: white; border: none; font-weight: bold; cursor: pointer; }
        .date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .nav-btn { width: 40px; background: none; color: var(--primary-color); font-size: 20px; }
        h2#dateTitle { margin: 0; font-size: 0.95rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        td, th { border: 1px solid #eee; padding: 6px 3px; font-size: 11px; }
        .ai-review-box { color: #2c3e50; font-size: 10px; margin-top: 6px; padding: 8px; background: var(--ai-bg); border-radius: 6px; border-left: 3px solid var(--ai-border); white-space: pre-wrap; line-height: 1.5; }
        .img-preview { width: 36px; height: 36px; object-fit: cover; border-radius: 4px; border: 1px solid #ddd; }
        .status-icon { cursor: pointer; filter: grayscale(1); opacity: 0.3; }
        .status-active { filter: grayscale(0); opacity: 1; }
    </style>
</head>
<body>

    <div id="loginView" class="card">
        <h2 style="text-align:center; color:var(--primary-color);">🏠 作业管理 v3.4</h2>
        <select id="userRole">
            <option value="admin">家长 (管理员)</option>
            <option value="dudu">👦🏼 嘟嘟</option>
            <option value="bobo">👦🏻 啵啵</option>
        </select>
        <input type="password" id="password" placeholder="访问密码">
        <button onclick="doLogin()">登 录</button>
    </div>

    <div id="appView" class="card hidden">
        <div class="date-nav">
            <button class="nav-btn" onclick="changeDate(-1)">⬅️</button>
            <h2 id="dateTitle">加载中...</h2>
            <button class="nav-btn" onclick="changeDate(1)">➡️</button>
        </div>
        
        <div id="adminArea" class="hidden">
            <h3 style="color:#e67e22;">📋 通用作业</h3>
            <table id="tbl-all"><tbody class="list-body"></tbody></table>
            <button onclick="addRow('all')">+ 增加通用项</button>
            <button class="btn-save" style="background:#ff9500; margin-top:10px;" onclick="doSave(true)">🚀 保存并推送微信</button>
        </div>

        <div id="studentArea" class="hidden">
            <table>
                <thead><tr><th width="28%">科目</th><th width="42%">内容</th><th width="15%">状态</th><th width="15%">拍照</th></tr></thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const SB_URL = "https://mupjybbafixsmdlsqxxq.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11cGp5YmJhZml4c21kbHNxeHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzUwMTcsImV4cCI6MjA4ODYxMTAxN30.bfNvl_e30pv8EVNeMcJj7O60p96ltp96J2abm2YT7hA"; 
        const client = window.supabase.createClient(SB_URL, SB_KEY);

        let currentRole = '';
        let viewDate = new Date();
        const getStr = (d) => new Intl.DateTimeFormat('zh-CN', {timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit'}).format(d).replace(/\//g, '-');

        function doLogin() {
            if (document.getElementById('password').value === users[document.getElementById('userRole').value]) {
                currentRole = document.getElementById('userRole').value;
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                loadDashboard();
            } else alert("密码错误");
        }
        const users = {'admin':'admin', 'dudu':'dudu', 'bobo':'bobo'};

        async function loadDashboard() {
            const dateStr = getStr(viewDate);
            document.getElementById('dateTitle').innerText = dateStr;
            const { data } = await client.from('HOMEWORK_TASKS').select('*').eq('date_str', dateStr);
            
            if (currentRole === 'admin') {
                document.getElementById('adminArea').classList.remove('hidden');
                document.getElementById('studentArea').classList.add('hidden');
                // ...此处省略 addRow 调用，逻辑同前...
            } else {
                document.getElementById('adminArea').classList.add('hidden');
                document.getElementById('studentArea').classList.remove('hidden');
                const tbody = document.getElementById('studentBody');
                tbody.innerHTML = '';
                data.filter(d => d.target_user === 'all' || d.target_user === currentRole).forEach(d => {
                    const tr = document.createElement('tr');
                    const imgUrl = currentRole === 'dudu' ? (d.dudu_img || d.image_url) : d.bobo_img;
                    const review = currentRole === 'dudu' ? (d.dudu_review || d.ai_review) : d.bobo_review;
                    const status = currentRole === 'dudu' ? (d.target_user==='all'?d.dudu_status:d.status) : (d.target_user==='all'?d.bobo_status:d.status);
                    
                    tr.innerHTML = `
                        <td>${d.subject}</td>
                        <td>${d.content} ${review ? `<div class="ai-review-box">🤖 ${review}</div>` : ''}</td>
                        <td style="text-align:center">${status ? '🟢' : '⚪'}</td>
                        <td>
                            ${imgUrl ? `<img src="${imgUrl}" class="img-preview" onclick="window.open('${imgUrl}')">` : ''}
                            <button style="width:auto;padding:2px 5px;" onclick="triggerCamera(${d.id})">📸</button>
                            <input type="file" id="cam-${d.id}" accept="image/*" capture="environment" style="display:none" onchange="handleFileSelect(this, ${d.id})">
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        async function handleFileSelect(input, taskId) {
            const file = input.files[0]; if (!file) return;
            try {
                const fileName = `hw_${taskId}_${currentRole}_${Date.now()}.jpg`;
                await client.storage.from('HOMEWORK_PHOTOS').upload(fileName, file);
                const { data: urlData } = client.storage.from('HOMEWORK_PHOTOS').getPublicUrl(fileName);
                const publicUrl = urlData.publicUrl;

                const updateObj = currentRole === 'dudu' ? { dudu_img: publicUrl } : { bobo_img: publicUrl };
                await client.from('HOMEWORK_TASKS').update(updateObj).eq('id', taskId);
                
                // 调用 Gemini 云函数
                await callGeminiAI(publicUrl, taskId);
                loadDashboard();
            } catch (err) { alert("上传失败"); }
        }

async function callGeminiAI(imageUrl, taskId) {
    try {
        const response = await client.functions.invoke('gemini-review', { 
            body: { imageUrl, prompt: "
                角色： 你是一位拥有20年教学经验的资深小学导师，擅长极简、精准的作业批改，评价风格直击要点，拒绝冗余。
                任务： 请识别并批改上传的图片（仅限：数学、语文、英语、日记之一）。
                输出格式要求：
                首行直接注明【科目：XXX】。
                核心反馈（按科目执行）：
                    数学：数据统计： 总题量/空格数：[X] | 错误数：[X] | 正确率：[X%]错题清单： 序号 + 错误原因简述（如：计算失误、理解偏差）。
                    语文：纠错： 罗列错别字（原字 -> 正确字）。表达： 指出书写不规范或语句不通顺处，给出简易修改建议。
                    英语：重点检查： 单词拼写、语法错误、时态误用。反馈： 仅列出错误点及正确表达。
                    日记：评价： 1句话优点 + 1个改进点（侧重错别字或标点）。
                最后总结： 1句极简的鼓励（不超过15字）。" } 
        });

        // 检查返回数据结构
        if (response.data && (response.data.text || response.data.error)) {
            const aiText = response.data.error ? response.data.text : response.data.text;
            
            const updateObj = currentRole === 'dudu' ? { dudu_review: aiText } : { bobo_review: aiText };
            await client.from('HOMEWORK_TASKS').update(updateObj).eq('id', taskId);
            
            loadDashboard(); // 确保数据库字段已补齐，否则这里也会报错
        } else {
            console.error("响应格式异常:", response);
        }
    } catch (err) { 
        console.error("无法解析 AI 响应:", err);
        alert("批改出现问题，请查看控制台日志");
    }
}
        
        function triggerCamera(id) { document.getElementById(`cam-${id}`).click(); }
        function changeDate(n) { viewDate.setDate(viewDate.getDate() + n); loadDashboard(); }
    </script>
</body>
</html>
