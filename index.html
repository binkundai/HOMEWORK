<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童作业布置系统</title>
    <style>
        :root { --primary-color: #4a90e2; --secondary-color: #f5f7fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; max-width: 800px; margin: auto; background-color: var(--secondary-color); color: #333; }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        
        /* 1) 修正标题字体：改小并防止折行 */
        h2 { margin-top: 0; color: var(--primary-color); border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* 表格样式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; table-layout: fixed; }
        th, td { border: 1px solid #eee; padding: 10px 8px; text-align: left; font-size: 14px; word-break: break-all; }
        th { background-color: #fcfcfc; font-weight: 600; }
        
        /* 输入控件 */
        select, input { width: 100%; padding: 8px; margin: 4px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        
        .btn-primary { background-color: var(--primary-color); color: white; width: 100%; margin-top: 10px; }
        .btn-add { background-color: #34c759; color: white; margin-bottom: 10px; width: auto; font-size: 14px; }
        .btn-danger { background-color: #ff3b30; color: white; font-size: 12px; padding: 4px 8px; }
        
        .camera-label { display: inline-block; background-color: #5856d6; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: center; }
        .camera-input { display: none; }
        
        .footer-tool { margin-top: 30px; font-size: 11px; color: #bbb; text-align: center; cursor: pointer; }
        .user-info { font-size: 14px; color: #666; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="configView" class="card hidden">
        <h2>⚙️ 系统初始化配置</h2>
        <input type="password" id="tokenInput" placeholder="请输入您的 API Token">
        <button class="btn-primary" onclick="saveToken()">保存并进入</button>
    </div>

    <div id="loginView" class="card hidden">
        <h2 style="text-align: center;">🏠 家庭作业系统登录</h2>
        <select id="userRole">
            <option value="admin">管理员 (家长)</option>
            <option value="dudu">嘟嘟</option>
            <option value="bobo">啵啵</option>
        </select>
        <input type="password" id="password" placeholder="请输入访问密码">
        <button class="btn-primary" onclick="login()">登录</button>
        <p id="loginError" style="color: #ff3b30; font-size: 12px; display: none; text-align: center; margin-top: 10px;">⚠️ 密码不正确</p>
    </div>

    <div id="appView" class="card hidden">
        <h2 id="dateTitle">加载中...</h2>
        
        <div class="user-info">
            <span>当前用户：<strong id="currentUserDisplay">--</strong></span>
            <span onclick="logout()" style="text-decoration: underline; cursor: pointer; color: #999; font-size: 12px;">退出登录</span>
        </div>

        <button id="addTaskBtn" class="btn-add hidden" onclick="addTask()">+ 增加新科目</button>
        
        <table id="homeworkTable">
            <thead>
                <tr>
                    <th width="35%">学科</th>
                    <th width="40%">作业内容</th>
                    <th width="25%">操作</th>
                </tr>
            </thead>
            <tbody id="homeworkList"></tbody>
        </table>
    </div>

    <div class="footer-tool" onclick="resetConfig()">重置系统配置</div>

    <script>
        // --- 核心配置 ---
        const users = {
            'admin': { pass: '840802', name: '家长' },
            'dudu': { pass: 'dudu', name: '嘟嘟' },
            'bobo': { pass: 'bobo', name: '啵啵' }
        };

        // 2) 定义固定下拉选项
        const subjectOptions = [
            "学而思数学", "乐读数学", "集训队", "乐读语文", "乐读英语", "校内作业", "课外作业"
        ];

        let currentRole = '';

        window.onload = function() {
            const savedToken = localStorage.getItem('HOMEWORK_TOKEN');
            if (!savedToken) { showView('configView'); } 
            else { showView('loginView'); }
            updateDateHeader();
        };

        function showView(viewId) {
            ['configView', 'loginView', 'appView'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
        }

        function saveToken() {
            const token = document.getElementById('tokenInput').value;
            if (token.trim()) { localStorage.setItem('HOMEWORK_TOKEN', token); showView('loginView'); }
        }

        function resetConfig() {
            if(confirm('确定要重置配置吗？')) { localStorage.removeItem('HOMEWORK_TOKEN'); location.reload(); }
        }

        function login() {
            const role = document.getElementById('userRole').value;
            const pwd = document.getElementById('password').value;
            if (users[role] && users[role].pass === pwd) {
                currentRole = role;
                document.getElementById('currentUserDisplay').innerText = users[role].name;
                showView('appView');
                initAppContent();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('password').value = '';
            showView('loginView');
        }

        function updateDateHeader() {
            const today = new Date();
            const weeks = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('dateTitle').innerText = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日 ${weeks[today.getDay()]}`;
        }

        // 生成学科下拉菜单的 HTML 字符串
        function getSubjectSelectHtml() {
            let html = '<select class="subject-select">';
            subjectOptions.forEach(opt => {
                html += `<option value="${opt}">${opt}</option>`;
            });
            html += '</select>';
            return html;
        }

        function initAppContent() {
            const list = document.getElementById('homeworkList');
            list.innerHTML = ''; 

            if (currentRole === 'admin') {
                document.getElementById('addTaskBtn').classList.remove('hidden');
                addTask(); 
            } else {
                document.getElementById('addTaskBtn').classList.add('hidden');
                // 模拟数据展示
                const mockData = [{sub: '校内作业', content: '练习册P1-3'}];
                mockData.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${item.sub}</td><td>${item.content}</td>
                        <td><label class="camera-label">📷 拍照<input type="file" accept="image/*" capture="environment" class="camera-input" onchange="handleFile(this)"></label></td>`;
                    list.appendChild(tr);
                });
            }
        }

        function addTask() {
            const tbody = document.getElementById('homeworkList');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${getSubjectSelectHtml()}</td>
                <td><input type="text" placeholder="填写要求"></td>
                <td><button class="btn-danger" onclick="this.parentElement.parentElement.remove()">删除</button></td>
            `;
            tbody.appendChild(tr);
        }

        function handleFile(input) {
            if (input.files && input.files[0]) {
                alert(`读取成功: ${input.files[0].name}\n准备上传云端...`);
            }
        }
    </script>
</body>
</html>
