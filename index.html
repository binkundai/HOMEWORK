<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童作业布置系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-color: #4a90e2; --secondary-color: #f5f7fa; }
        body { font-family: -apple-system, sans-serif; padding: 15px; max-width: 800px; margin: auto; background-color: var(--secondary-color); }
        .hidden { display: none !important; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--primary-color); font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 10px 8px; text-align: left; font-size: 14px; }
        select, input { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { cursor: pointer; padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; }
        .btn-primary { background-color: var(--primary-color); color: white; width: 100%; }
        .btn-add { background-color: #34c759; color: white; margin-bottom: 10px; }
        .btn-save { background-color: #ff9500; color: white; width: 100%; margin-top: 20px; }
        .camera-label { background-color: #5856d6; color: white; padding: 6px 10px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="loginView" class="card">
        <h2 style="text-align: center;">🏠 家庭作业系统登录</h2>
        <select id="userRole">
            <option value="admin">管理员 (家长)</option>
            <option value="dudu">嘟嘟</option>
            <option value="bobo">啵啵</option>
        </select>
        <input type="password" id="password" placeholder="请输入访问密码">
        <button id="loginBtn" class="btn-primary" onclick="login()">登录</button>
        <p id="loginError" style="color: red; display: none; text-align: center;">密码错误</p>
    </div>

    <div id="appView" class="card hidden">
        <h2 id="dateTitle">--</h2>
        <div style="font-size: 13px; margin-bottom: 10px;">
            用户：<strong id="userDisplay">--</strong> | <a href="javascript:location.reload()">退出</a>
        </div>
        <div id="adminControls" class="hidden"><button class="btn-add" onclick="addTaskRow()">+ 增加科目</button></div>
        <table>
            <thead><tr><th width="35%">学科</th><th width="40%">内容</th><th width="25%">操作</th></tr></thead>
            <tbody id="listBody"></tbody>
        </table>
        <button id="saveBtn" class="btn-save hidden" onclick="saveData()">🚀 发布今日作业</button>
    </div>

    <script>
        const SB_URL = "https://mupjybbafixsmdlsqxxq.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11cGp5YmJhZml4c21kbHNxeHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzUwMTcsImV4cCI6MjA4ODYxMTAxN30.bfNvl_e30pv8EVNeMcJj7O60p96ltp96J2abm2YT7hAeyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11cGp5YmJhZml4c21kbHNxeHhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzUwMTcsImV4cCI6MjA4ODYxMTAxN30.bfNvl_e30pv8EVNeMcJj7O60p96ltp96J2abm2YT7hA";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const users = {'admin':'840802', 'dudu':'dudu', 'bobo':'bobo'};
        const subjects = ["学而思数学", "乐读数学", "集训队", "乐读语文", "乐读英语", "校内作业", "课外作业"];
        let currentRole = '';

        function login() {
            const role = document.getElementById('userRole').value;
            const pwd = document.getElementById('password').value;
            if (users[role] === pwd) {
                currentRole = role;
                document.getElementById('userDisplay').innerText = role === 'admin' ? '家长' : role;
                // 先显示界面，防止卡死
                document.getElementById('loginView').classList.add('hidden');
                document.getElementById('appView').classList.remove('hidden');
                initApp();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        async function initApp() {
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            document.getElementById('dateTitle').innerText = dateStr + " 作业清单";
            const list = document.getElementById('listBody');
            list.innerHTML = '<tr><td colspan="3">正在同步云端数据...</td></tr>';

            try {
                // 查询时使用大写表名
                const { data, error } = await supabase.from('HOMEWORK_TASKS').select('*').eq('date_str', dateStr);
                list.innerHTML = '';
                
                if (currentRole === 'admin') {
                    document.getElementById('adminControls').classList.remove('hidden');
                    document.getElementById('saveBtn').classList.remove('hidden');
                    if (data && data.length > 0) data.forEach(d => addTaskRow(d));
                    else addTaskRow();
                } else {
                    if (!data || data.length === 0) {
                        list.innerHTML = '<tr><td colspan="3" style="text-align:center">今日暂无作业</td></tr>';
                    } else {
                        data.forEach(d => {
                            const tr = document.createElement('tr');
                            tr.innerHTML = `<td><b>${d.subject||d.SUBJECT}</b></td><td>${d.content||d.CONTENT}</td><td><label class="camera-label">📸拍照<input type="file" accept="image/*" capture="environment" style="display:none" onchange="uploadImg(this, ${d.id||d.ID})"></label></td>`;
                            list.appendChild(tr);
                        });
                    }
                }
            } catch (e) {
                list.innerHTML = '<tr><td colspan="3">数据连接异常，请检查字段名</td></tr>';
            }
        }

        function addTaskRow(d = null) {
            const tr = document.createElement('tr');
            let opts = subjects.map(s => `<option value="${s}" ${(d&&(d.subject||d.SUBJECT)===s)?'selected':''}>${s}</option>`).join('');
            tr.innerHTML = `<td><select class="s-in">${opts}</select></td><td><input type="text" class="c-in" value="${d?(d.content||d.CONTENT):''}"></td><td><button onclick="this.parentElement.parentElement.remove()">❌</button></td>`;
            document.getElementById('listBody').appendChild(tr);
        }

        async function saveData() {
            const dateStr = document.getElementById('dateTitle').innerText.split(' ')[0];
            const rows = document.querySelectorAll('#listBody tr');
            const tasks = [];
            rows.forEach(r => {
                const s = r.querySelector('.s-in')?.value;
                const c = r.querySelector('.c-in')?.value;
                if (c) tasks.push({ date_str: dateStr, subject: s, content: c });
            });

            await supabase.from('HOMEWORK_TASKS').delete().eq('date_str', dateStr);
            const { error } = await supabase.from('HOMEWORK_TASKS').insert(tasks);
            alert(error ? "发布失败" : "发布成功！");
        }

        async function uploadImg(input, id) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const name = `img_${id}_${Date.now()}.jpg`;
            const { error: upErr } = await supabase.storage.from('HOMEWORK_PHOTOS').upload(name, file);
            if (upErr) return alert("上传失败");
            const { data } = supabase.storage.from('HOMEWORK_PHOTOS').getPublicUrl(name);
            await supabase.from('HOMEWORK_TASKS').update({ image_url: data.publicUrl }).eq('id', id);
            alert("拍照上传成功！");
        }
    </script>
</body>
</html>
